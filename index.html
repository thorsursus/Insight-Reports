<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
    color: #222;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 48px;
  }
  .projects {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 800px;
  }
  .project-card {
    display: block;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 32px 36px;
    min-width: 240px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .project-card:hover {
    border-color: #999;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .project-card h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .project-card p {
    font-size: 13px;
    color: #999;
    font-family: monospace;
  }
</style>
</head>
<body>
  <h1>Insight Reports</h1>
  <p class="subtitle">Select a project</p>
  <div class="projects">
    
    <a href="future-consultancy/" class="project-card">
      <h2>Future Consultancy</h2>
      <p>future-consultancy/</p>
    </a>
  </div>
</body>
</html>
